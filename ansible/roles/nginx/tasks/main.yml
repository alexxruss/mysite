---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Start nginx
  systemd:
    name: nginx
    state: started
    enabled: true

- name: Check if SSL certificate already exists
  stat:
    path: /etc/letsencrypt/live/avrusanov.ru/fullchain.pem
  register: cert_exists

# Копируем "чистый" HTTP-конфиг только до выпуска сертификата,
# чтобы не затирать конфиг, который потом отредактирует certbot.
- name: Copy nginx config (HTTP only, pre-SSL)
  copy:
    src: mysite.conf
    dest: /etc/nginx/sites-available/mysite
  when: not cert_exists.stat.exists
  notify: Reload nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/mysite
    dest: /etc/nginx/sites-enabled/mysite
    state: link
  notify: Reload nginx

- name: Remove default config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Install certbot
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Obtain SSL certificate
  command: >
    certbot --nginx -d avrusanov.ru -d www.avrusanov.ru
    --non-interactive --agree-tos -m avrtrump@gmail.com
  when: not cert_exists.stat.exists
