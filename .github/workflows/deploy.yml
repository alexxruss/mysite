name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # На ubuntu-latest уже предустановлен Ansible, и он может перехватывать
      # команду "ansible-playbook" через PATH раньше pipx/новой версии.
      # Ставим Ansible в отдельный venv и вызываем его по полному пути,
      # чтобы гарантированно использовать нужную версию.
      #
      # ВАЖНО: версия жёстко зафиксирована ниже 2.19 — в ansible-core 2.19
      # есть подтверждённый баг в ssh-плагине (_is_tty_requested падает
      # с "argparse.ArgumentError: argument -o: expected one argument"
      # прямо на "Gathering Facts"), см. ansible/ansible#86298.
      # Playbook использует только builtin-модули (apt, systemd, copy, file,
      # command), поэтому полный пакет "ansible" не нужен — хватает ansible-core.
      - name: Install Ansible
        run: |
          python3 -m venv /tmp/ansible-venv
          /tmp/ansible-venv/bin/pip install --upgrade pip
          /tmp/ansible-venv/bin/pip install "ansible-core<2.19"

      - name: Setup SSH key for Ansible
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/mykey
          chmod 600 ~/.ssh/mykey

      # Провижининг сервера (docker, nginx, certbot) должен пройти
      # ДО первого запуска контейнера — иначе на новом сервере
      # шаг "Deploy container" упадёт, т.к. docker ещё не установлен.
      - name: Run Ansible
        run: |
          cd ansible
          /tmp/ansible-venv/bin/ansible-playbook \
            -i "${{ secrets.SERVER_IP }}," \
            -u "${{ secrets.SERVER_USER }}" \
            --private-key ~/.ssh/mykey \
            -e ansible_ssh_common_args='-o StrictHostKeyChecking=no' \
            playbook.yml

      - name: Build
        run: docker build -t mysite -f docker/Dockerfile .

      - name: Save
        run: docker save mysite > mysite.tar

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "mysite.tar"
          target: "/home/${{ secrets.SERVER_USER }}/"

      - name: Deploy container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load < mysite.tar
            docker stop mysite || true
            docker rm mysite || true
            docker run -d -p 127.0.0.1:8080:80 --restart unless-stopped --name mysite mysite
            rm -f mysite.tar
            docker image prune -f
